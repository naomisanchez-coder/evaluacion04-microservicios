services:
  mysql-usuarios:
    image: mysql:8.0
    container_name: mysql-usuarios
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: usuario_db
    ports:
      - "3307:3306"

  mysql-proyectos:
    image: mysql:8.0
    container_name: mysql-proyectos
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: proyecto_db
    ports:
      - "3308:3306"

  mysql-tareas:
    image: mysql:8.0
    container_name: mysql-tareas
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: tarea_db
    ports:
      - "3309:3306"

  config-server:
    build: ./config-server/config-server
    container_name: config-server
    ports:
      - "8888:8888"
    volumes:
      - ./config-repo:/config-repo
    environment:
      SPRING_CLOUD_CONFIG_SERVER_NATIVE_SEARCH_LOCATIONS: file:/config-repo

  eureka-server:
    build: ./eureka-server/eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    depends_on:
      - config-server

  api-gateway:
    build: ./api-gateway/api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - config-server
      - eureka-server
      - usuario-service
      - proyecto-service
      - tarea-service
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/

  usuario-service:
    build: ./usuario-service/usuario-service
    container_name: usuario-service
    ports:
      - "8081:8081"
    depends_on:
      - config-server
      - eureka-server
      - mysql-usuarios
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-usuarios:3306/usuario_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ""

  proyecto-service:
    build: ./proyecto-service/proyecto-service
    container_name: proyecto-service
    ports:
      - "8082:8082"
    depends_on:
      - config-server
      - eureka-server
      - mysql-proyectos
      - usuario-service
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-proyectos:3306/proyecto_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ""

  tarea-service:
    build: ./tarea-service/tarea-service
    container_name: tarea-service
    ports:
      - "8083:8083"
    depends_on:
      - config-server
      - eureka-server
      - mysql-tareas
      - proyecto-service
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-tareas:3306/tarea_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ""